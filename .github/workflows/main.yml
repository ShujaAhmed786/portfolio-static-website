name: Deploy Portfolio to AWS S3

on:
  push:
    branches:
      - main  # Set this to 'master' if that is your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Configure AWS Credentials using GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Step 3: Sync static files to AWS S3
      - name: Sync Files to S3 Bucket
        run: |
          aws s3 sync . s3://static-website-shuja \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md"